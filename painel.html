<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel – Produtos Priscila</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:#e8427c; --pink-light:#fce8f0; --pink-dark:#c0305f;
    --cream:#fdf8f5; --dark:#1a1020; --gray:#7a6e78; --border:#f0d9e8;
    --green:#27ae60;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:#f5f0f8; color:var(--dark); min-height:100vh; }

  /* HEADER */
  header { background:linear-gradient(135deg,#1a1020,#3d1535); padding:18px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  header h1 { font-family:'Playfair Display',serif; font-size:1.2rem; color:#fff; }
  header p { color:rgba(255,255,255,0.55); font-size:0.72rem; margin-top:2px; }
  .header-badge { background:var(--pink); color:#fff; border-radius:8px; padding:5px 10px; font-size:0.72rem; font-weight:600; white-space:nowrap; flex-shrink:0; }

  main { max-width:1100px; margin:0 auto; padding:16px 12px 40px; }

  /* STATS */
  .stats { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px; }
  .stat-card { background:#fff; border-radius:12px; padding:14px 12px; border:1.5px solid var(--border); text-align:center; }
  .stat-value { font-family:'Playfair Display',serif; font-size:1.4rem; color:var(--pink-dark); font-weight:700; }
  .stat-label { font-size:0.68rem; color:var(--gray); margin-top:3px; }

  /* ACTIONS ROW */
  .actions-row { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .btn-refresh { display:flex; align-items:center; gap:6px; padding:9px 14px; background:#fff; border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:600; color:var(--dark); cursor:pointer; transition:all 0.2s; }
  .btn-refresh:hover { border-color:var(--pink); color:var(--pink-dark); }
  .btn-refresh.spinning svg { animation:spin 1s linear infinite; }
  .btn-pdf { display:flex; align-items:center; gap:6px; padding:9px 14px; background:var(--pink); border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:600; color:#fff; cursor:pointer; transition:background 0.2s; }
  .btn-pdf:hover { background:var(--pink-dark); }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* TABS */
  .tabs { display:flex; gap:6px; margin-bottom:14px; overflow-x:auto; padding-bottom:2px; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab-btn { padding:9px 14px; border:1.5px solid var(--border); border-radius:10px; background:#fff; font-family:'DM Sans',sans-serif; font-size:0.8rem; font-weight:600; color:var(--gray); cursor:pointer; transition:all 0.2s; white-space:nowrap; flex-shrink:0; }
  .tab-btn.active { background:var(--pink-dark); color:#fff; border-color:var(--pink-dark); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  /* FILTERS */
  .filters { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .filter-input { padding:9px 12px; border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.83rem; background:#fff; color:var(--dark); outline:none; flex:1; min-width:140px; }
  .filter-input:focus { border-color:var(--pink); }

  /* CARDS DE PEDIDO (mobile) */
  .order-card { background:#fff; border:1.5px solid var(--border); border-radius:12px; padding:14px; margin-bottom:10px; }
  .order-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; gap:8px; }
  .order-card-client { font-weight:600; font-size:0.9rem; }
  .order-card-date { font-size:0.72rem; color:var(--gray); margin-top:2px; }
  .order-card-total { font-family:'Playfair Display',serif; font-size:1rem; color:var(--pink-dark); font-weight:700; white-space:nowrap; }
  .order-card-items { font-size:0.78rem; color:var(--gray); line-height:1.6; margin-bottom:10px; }
  .order-card-items span { display:block; }
  .order-card-footer { display:flex; justify-content:flex-end; gap:8px; }

  /* CARDS DE CLIENTE */
  .client-card { background:#fff; border:1.5px solid var(--border); border-radius:12px; padding:14px; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .client-card-info { flex:1; }
  .client-card-name { font-weight:600; font-size:0.9rem; }
  .client-card-meta { font-size:0.73rem; color:var(--gray); margin-top:3px; }
  .client-card-right { text-align:right; flex-shrink:0; }
  .client-card-total { font-family:'Playfair Display',serif; font-size:1rem; color:var(--pink-dark); font-weight:700; }

  /* CARDS DE PRODUTO */
  .prod-card { background:#fff; border:1.5px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
  .prod-card-code { font-family:monospace; font-size:0.72rem; color:var(--gray); white-space:nowrap; }
  .prod-card-name { font-size:0.84rem; font-weight:500; flex:1; }
  .prod-card-price { font-weight:600; color:var(--green); font-size:0.88rem; white-space:nowrap; }

  /* RANKING */
  .rank-card { background:#fff; border:1.5px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:12px; }
  .rank-num { width:28px; height:28px; border-radius:50%; background:var(--pink-light); color:var(--pink-dark); font-weight:700; font-size:0.82rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .rank-num.gold { background:#ffd700; color:#7a5a00; }
  .rank-num.silver { background:#e0e0e0; color:#555; }
  .rank-num.bronze { background:#f0c080; color:#7a4a00; }
  .rank-name { flex:1; font-size:0.84rem; font-weight:500; }
  .rank-count { font-size:0.78rem; color:var(--gray); }
  .rank-value { font-family:'Playfair Display',serif; font-size:0.95rem; color:var(--pink-dark); font-weight:700; }

  /* BUTTONS */
  .del-btn { background:transparent; border:1.5px solid #f5c0c0; border-radius:7px; padding:6px 10px; font-size:0.75rem; font-family:'DM Sans',sans-serif; color:#c0305f; cursor:pointer; transition:all 0.15s; }
  .del-btn:hover { background:#fff0f0; border-color:#e8427c; }
  .clear-all-wrap { margin-bottom:12px; display:flex; justify-content:flex-end; }
  .clear-all-btn { display:inline-flex; align-items:center; gap:6px; background:#fff0f0; border:1.5px solid #f5c0c0; border-radius:9px; padding:8px 14px; font-size:0.8rem; font-family:'DM Sans',sans-serif; color:#c0305f; cursor:pointer; font-weight:600; }
  .clear-all-btn:hover { background:#ffe0e0; }

  .loading-state { text-align:center; padding:40px 20px; color:var(--gray); }
  .spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--pink); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 10px; }
  .empty-msg { text-align:center; padding:30px; color:var(--gray); font-size:0.87rem; }

  /* SEÇÃO TÍTULO */
  .section-title { font-family:'Playfair Display',serif; font-size:0.95rem; color:var(--pink-dark); margin-bottom:10px; padding-bottom:6px; border-bottom:2px solid var(--border); }

  @media(min-width:640px) {
    .stats { grid-template-columns:repeat(4,1fr); }
    header h1 { font-size:1.4rem; }
    main { padding:20px 20px 40px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🌸 Painel – Produtos Priscila</h1>
    <p>Visão geral de pedidos e clientes</p>
  </div>
  <div class="header-badge">Admin</div>
</header>

<main>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card"><div class="stat-value" id="stat-total-pedidos">–</div><div class="stat-label">Pedidos</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-total-valor">–</div><div class="stat-label">Volume total</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-total-clientes">–</div><div class="stat-label">Clientes</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-total-produtos">–</div><div class="stat-label">Produtos</div></div>
  </div>

  <!-- ACTIONS -->
  <div class="actions-row">
    <button class="btn-refresh" id="btn-refresh" onclick="refreshData()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Atualizar
    </button>
    <button class="btn-pdf" onclick="exportPDF()">
      📄 Exportar PDF
    </button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('pedidos',this)">📦 Pedidos</button>
    <button class="tab-btn" onclick="switchTab('clientes',this)">👥 Clientes</button>
    <button class="tab-btn" onclick="switchTab('produtos',this)">🏷️ Produtos</button>
    <button class="tab-btn" onclick="switchTab('ranking',this)">🏆 Ranking</button>
  </div>

  <!-- TAB PEDIDOS -->
  <div id="tab-pedidos" class="tab-content active">
    <div class="filters">
      <input type="text" class="filter-input" id="filter-pedidos" placeholder="🔍 Buscar cliente ou produto…" oninput="renderOrders()">
      <input type="date" class="filter-input" id="filter-date" style="max-width:170px" onchange="renderOrders()">
    </div>
    <div class="clear-all-wrap">
      <button class="clear-all-btn" onclick="clearAllOrders()">🗑️ Apagar todos</button>
    </div>
    <div id="orders-loading" class="loading-state"><div class="spinner"></div>Carregando…</div>
    <div id="orders-list"></div>
  </div>

  <!-- TAB CLIENTES -->
  <div id="tab-clientes" class="tab-content">
    <div class="filters">
      <input type="text" class="filter-input" id="filter-clientes" placeholder="🔍 Buscar cliente…" oninput="renderClients()">
    </div>
    <div id="clients-list"></div>
  </div>

  <!-- TAB PRODUTOS -->
  <div id="tab-produtos" class="tab-content">
    <div class="filters">
      <input type="text" class="filter-input" id="filter-produtos" placeholder="🔍 Buscar produto…" oninput="renderProducts()">
    </div>
    <div id="products-loading" class="loading-state"><div class="spinner"></div>Carregando…</div>
    <div id="products-list"></div>
  </div>

  <!-- TAB RANKING -->
  <div id="tab-ranking" class="tab-content">
    <div class="section-title">🏆 Produtos mais pedidos</div>
    <div id="ranking-list"><div class="empty-msg">Nenhum dado disponível.</div></div>
  </div>

</main>

<script>
const SHEET_ID            = '1q8E1PE5jix4nPsvaZd1g61rLI2jLflqfsXt7_YPwwoE';
const SHEET_PRODUCTS_NAME = 'Produtos';
const SHEET_ORDERS_NAME   = 'Pedidos';
const LS_KEY              = 'painel_deleted_ids'; // IDs de pedidos excluídos

let allOrders   = [];
let allProducts = [];

function fmt(v) { return Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }

// ── TABS ───────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// ── PARSE DATE ─────────────────────────────────────────
function parseDate(raw) {
  if (!raw) return '';
  const s = raw.toString().trim();
  // formato Google: Date(2026,3,16,11,2,0) — mês é base 0
  const m = s.match(/Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+))?/);
  if (m) {
    const d    = String(m[3]).padStart(2,'0');
    const mo   = String(parseInt(m[2])+1).padStart(2,'0');
    const y    = m[1];
    const h    = m[4] ? String(m[4]).padStart(2,'0') : null;
    const mi   = m[5] ? String(m[5]).padStart(2,'0') : null;
    return h ? `${d}/${mo}/${y} ${h}:${mi}` : `${d}/${mo}/${y}`;
  }
  return s;
}

// ── FETCH SHEET ────────────────────────────────────────
async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&t=${Date.now()}`;
  const res  = await fetch(url, { cache:'no-store' });
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json.table.rows;
}

// ── LOAD ───────────────────────────────────────────────
async function loadAll() {
  try {
    const prodRows = await fetchSheet(SHEET_PRODUCTS_NAME);
    allProducts = prodRows.slice(1).map(r => ({
      code:  (r.c[0]?.v ?? '').toString().trim(),
      name:  (r.c[1]?.v ?? '').toString().trim(),
      price: parseFloat(r.c[2]?.v ?? 0) || 0,
    })).filter(p => p.name);

    const ordRows = await fetchSheet(SHEET_ORDERS_NAME);
    const sheetOrders = ordRows.slice(1).map((r, i) => {
      const rawDate = r.c[0]?.v ?? '';
      const date    = parseDate(rawDate);
      return {
        _id:    i + '_' + rawDate.toString().replace(/\W/g,''),
        date,
        client: (r.c[1]?.v ?? '').toString().trim(),
        items:  (r.c[2]?.v ?? '').toString().trim(),
        total:  parseFloat((r.c[3]?.v ?? '0').toString().replace(/[^\d,.]/g,'').replace(',','.')) || 0,
      };
    }).filter(o => o.client);

    // filtra os que foram excluídos localmente
    const deleted = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
    allOrders = sheetOrders.filter(o => !deleted.includes(o._id));

  } catch(e) {
    console.error('Erro:', e);
    allOrders   = [];
    allProducts = [];
  }
  renderAll();
  document.getElementById('orders-loading').style.display   = 'none';
  document.getElementById('products-loading').style.display = 'none';
}

async function refreshData() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  btn.disabled = true;
  await loadAll();
  btn.classList.remove('spinning');
  btn.disabled = false;
}

function renderAll() {
  renderOrders();
  renderClients();
  renderProducts();
  renderRanking();
  updateStats();
}

// ── STATS ──────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-total-pedidos').textContent  = allOrders.length;
  document.getElementById('stat-total-valor').textContent    = fmt(allOrders.reduce((s,o)=>s+o.total,0));
  const uniq = new Set(allOrders.map(o=>o.client.toLowerCase()));
  document.getElementById('stat-total-clientes').textContent = uniq.size;
  document.getElementById('stat-total-produtos').textContent = allProducts.length;
}

// ── PEDIDOS ────────────────────────────────────────────
function renderOrders() {
  const q    = (document.getElementById('filter-pedidos')?.value||'').toLowerCase();
  const date = document.getElementById('filter-date')?.value||'';
  const list = document.getElementById('orders-list');

  const filtered = allOrders
    .map((o,i) => ({...o, _idx:i}))
    .filter(o =>
      (!q || o.client.toLowerCase().includes(q) || o.items.toLowerCase().includes(q)) &&
      (!date || o.date.includes(date.split('-').reverse().join('/')))
    );

  if (!filtered.length) { list.innerHTML = '<div class="empty-msg">Nenhum pedido encontrado.</div>'; return; }

  list.innerHTML = filtered.map(o => `
    <div class="order-card" id="ocard-${o._idx}">
      <div class="order-card-header">
        <div>
          <div class="order-card-client">${o.client}</div>
          <div class="order-card-date">📅 ${o.date}</div>
        </div>
        <div class="order-card-total">${fmt(o.total)}</div>
      </div>
      <div class="order-card-items">
        ${o.items.split('\n').map(i=>`<span>• ${i}</span>`).join('')}
      </div>
      <div class="order-card-footer">
        <button class="del-btn" onclick="deleteOrder('${o._id}', ${o._idx})">🗑️ Excluir</button>
      </div>
    </div>`).join('');
}

function deleteOrder(id, idx) {
  if (!confirm('Excluir este pedido?')) return;
  // salva ID no localStorage para persistir exclusão
  const deleted = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
  if (!deleted.includes(id)) deleted.push(id);
  localStorage.setItem(LS_KEY, JSON.stringify(deleted));
  allOrders.splice(idx, 1);
  renderAll();
}

function clearAllOrders() {
  if (!confirm('Apagar TODOS os pedidos?')) return;
  // marca todos como excluídos
  const deleted = allOrders.map(o => o._id);
  localStorage.setItem(LS_KEY, JSON.stringify(deleted));
  allOrders = [];
  renderAll();
}

// ── CLIENTES ───────────────────────────────────────────
function renderClients() {
  const q   = (document.getElementById('filter-clientes')?.value||'').toLowerCase();
  const map = {};
  allOrders.forEach(o => {
    const k = o.client.toLowerCase();
    if (!map[k]) map[k] = { name:o.client, count:0, total:0, last:'' };
    map[k].count++;
    map[k].total += o.total;
    if (!map[k].last || o.date > map[k].last) map[k].last = o.date;
  });

  const clients = Object.values(map)
    .filter(c => !q || c.name.toLowerCase().includes(q))
    .sort((a,b) => b.total - a.total);

  const list = document.getElementById('clients-list');
  if (!clients.length) { list.innerHTML = '<div class="empty-msg">Nenhum cliente encontrado.</div>'; return; }

  list.innerHTML = clients.map(c => `
    <div class="client-card">
      <div class="client-card-info">
        <div class="client-card-name">${c.name}</div>
        <div class="client-card-meta">${c.count} pedido${c.count!==1?'s':''} · Último: ${c.last}</div>
      </div>
      <div class="client-card-right">
        <div class="client-card-total">${fmt(c.total)}</div>
        <button class="del-btn" style="margin-top:6px" onclick="deleteClientOrders('${c.name.replace(/'/g,"\\'")}')">🗑️</button>
      </div>
    </div>`).join('');
}

function deleteClientOrders(clientName) {
  if (!confirm(`Excluir todos os pedidos de "${clientName}"?`)) return;
  const toDelete = allOrders.filter(o => o.client.toLowerCase() === clientName.toLowerCase()).map(o => o._id);
  const deleted  = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
  toDelete.forEach(id => { if (!deleted.includes(id)) deleted.push(id); });
  localStorage.setItem(LS_KEY, JSON.stringify(deleted));
  allOrders = allOrders.filter(o => o.client.toLowerCase() !== clientName.toLowerCase());
  renderAll();
}

// ── PRODUTOS ───────────────────────────────────────────
function renderProducts() {
  const q = (document.getElementById('filter-produtos')?.value||'').toLowerCase();
  const filtered = allProducts
    .filter(p => !q || p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q))
    .sort((a,b) => a.name.localeCompare(b.name));

  const list = document.getElementById('products-list');
  if (!filtered.length) { list.innerHTML = '<div class="empty-msg">Nenhum produto encontrado.</div>'; return; }

  list.innerHTML = filtered.map(p => `
    <div class="prod-card">
      <div class="prod-card-code">${p.code}</div>
      <div class="prod-card-name">${p.name}</div>
      <div class="prod-card-price">${p.price>0?fmt(p.price):'A consultar'}</div>
    </div>`).join('');
}

// ── RANKING ────────────────────────────────────────────
function renderRanking() {
  const map = {};
  allOrders.forEach(o => {
    o.items.split('\n').forEach(line => {
      const m = line.match(/^(.+?)\s*\((\d+)×\)$/);
      if (m) {
        const name = m[1].trim();
        const qty  = parseInt(m[2]);
        if (!map[name]) map[name] = { name, qty:0 };
        map[name].qty += qty;
      }
    });
  });

  const ranked = Object.values(map).sort((a,b) => b.qty - a.qty).slice(0,10);
  const list   = document.getElementById('ranking-list');
  if (!ranked.length) { list.innerHTML = '<div class="empty-msg">Nenhum dado disponível.</div>'; return; }

  const medals = ['gold','silver','bronze'];
  list.innerHTML = ranked.map((p,i) => `
    <div class="rank-card">
      <div class="rank-num ${medals[i]||''}">${i+1}</div>
      <div class="rank-name">${p.name}</div>
      <div class="rank-count">${p.qty} un.</div>
    </div>`).join('');
}

// ── PDF ────────────────────────────────────────────────
function exportPDF() {
  const q    = (document.getElementById('filter-pedidos')?.value||'').toLowerCase();
  const date = document.getElementById('filter-date')?.value||'';
  const filtered = allOrders.filter(o =>
    (!q || o.client.toLowerCase().includes(q) || o.items.toLowerCase().includes(q)) &&
    (!date || o.date.includes(date.split('-').reverse().join('/')))
  );
  if (!filtered.length) { alert('Nenhum pedido para exportar.'); return; }

  const totalGeral = filtered.reduce((s,o) => s+o.total, 0);
  const now = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

  const html = `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
  <title>Relatório de Pedidos</title>
  <style>
    body { font-family:Arial,sans-serif; color:#1a1020; padding:30px; max-width:900px; margin:0 auto; }
    h1 { font-size:1.4rem; color:#c0305f; margin-bottom:4px; }
    .subtitle { font-size:0.82rem; color:#7a6e78; margin-bottom:24px; }
    .order { border:1px solid #f0d9e8; border-radius:8px; padding:14px 16px; margin-bottom:14px; page-break-inside:avoid; }
    .order-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
    .order-client { font-weight:700; font-size:1rem; }
    .order-date { font-size:0.75rem; color:#7a6e78; margin-top:2px; }
    .order-total { font-size:1.1rem; font-weight:700; color:#c0305f; }
    table { width:100%; border-collapse:collapse; margin-top:6px; }
    th { background:#c0305f; color:#fff; padding:7px 10px; text-align:left; font-size:0.78rem; }
    td { padding:7px 10px; border-bottom:1px solid #f0d9e8; font-size:0.80rem; }
    tr:last-child td { border-bottom:none; }
    .footer { margin-top:24px; padding-top:14px; border-top:2px solid #f0d9e8; display:flex; justify-content:space-between; align-items:center; }
    .footer-total { font-size:1.1rem; font-weight:700; color:#c0305f; }
    .footer-count { font-size:0.82rem; color:#7a6e78; }
    @media print { body { padding:10px; } }
  </style></head><body>
  <h1>🌸 Relatório de Pedidos – Produtos Priscila</h1>
  <div class="subtitle">Gerado em: ${now} · ${filtered.length} pedido${filtered.length!==1?'s':''}</div>
  ${filtered.map(o => {
    const rows = o.items.split('\n').map(line => {
      // tenta extrair código do item
      const prodMatch = allProducts.find(p => line.includes(p.name.substring(0,20)));
      const code = prodMatch ? prodMatch.code : '–';
      const m = line.match(/^(.+?)\s*\((\d+)×\)$/);
      if (m) return `<tr><td>${code}</td><td>${m[1].trim()}</td><td style="text-align:center">${m[2]}</td></tr>`;
      return `<tr><td>${code}</td><td colspan="2">${line}</td></tr>`;
    }).join('');
    return `
    <div class="order">
      <div class="order-header">
        <div>
          <div class="order-client">👤 ${o.client}</div>
          <div class="order-date">📅 ${o.date}</div>
        </div>
        <div class="order-total">${fmt(o.total)}</div>
      </div>
      <table>
        <thead><tr><th>Código</th><th>Produto</th><th>Qtd</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('')}
  <div class="footer">
    <div class="footer-count">${filtered.length} pedido${filtered.length!==1?'s':''} exportado${filtered.length!==1?'s':''}</div>
    <div class="footer-total">Total geral: ${fmt(totalGeral)}</div>
  </div>
  <script>window.onload=()=>{window.print();}<\/script>
  </body></html>`;

  const w = window.open('','_blank');
  w.document.write(html);
  w.document.close();
}

loadAll();
