<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos Priscila</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #e8427c;
    --pink-light: #fce8f0;
    --pink-dark: #c0305f;
    --cream: #fdf8f5;
    --dark: #1a1020;
    --gray: #7a6e78;
    --border: #f0d9e8;
    --green: #25d366;
    --shadow: 0 4px 24px rgba(232,66,124,0.10);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--dark); min-height:100vh; }

  header {
    background:linear-gradient(135deg,#e8427c 0%,#c0305f 60%,#8b1a40 100%);
    padding:28px 20px 20px; text-align:center; position:relative; overflow:hidden;
  }
  header h1 { font-family:'Playfair Display',serif; font-size:1.8rem; color:#fff; position:relative; z-index:1; }
  header p  { color:rgba(255,255,255,0.80); font-size:0.82rem; margin-top:4px; font-weight:300; position:relative; z-index:1; }

  .tabs { display:flex; background:#fff; border-bottom:2px solid var(--border); position:sticky; top:0; z-index:50; }
  .tab-btn {
    flex:1; padding:13px 8px; border:none; background:transparent;
    font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:600;
    color:var(--gray); cursor:pointer; transition:all 0.2s;
    border-bottom:2px solid transparent; margin-bottom:-2px;
  }
  .tab-btn.active { color:var(--pink-dark); border-bottom-color:var(--pink); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  main { max-width:680px; margin:0 auto; padding:18px 16px 130px; }

  /* FIELD NAME */
  .name-section { margin-bottom:18px; }
  .field-label { display:block; font-size:0.75rem; font-weight:600; color:var(--pink-dark); margin-bottom:6px; letter-spacing:0.05em; text-transform:uppercase; }
  .name-input {
    width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:12px;
    font-family:'DM Sans',sans-serif; font-size:0.95rem; background:#fff; color:var(--dark); outline:none;
  }

  /* SECTION TITLE REESTILIZADO */
  .section-title {
    font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--pink-dark);
    margin:0 0 10px; padding-bottom:6px; border-bottom:2px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .cart-badge-top { 
    font-family:'DM Sans',sans-serif; font-size:0.75rem; 
    background: var(--pink); color: white; padding: 2px 10px; 
    border-radius: 20px; font-weight: 600;
  }

  /* PRODUTOS NO CARRINHO */
  .selected-item {
    background:#fff; border:1.5px solid var(--border); border-radius:12px;
    padding:10px; margin-bottom:8px; display:flex; align-items:center; gap:10px;
  }
  .item-img { width:50px; height:50px; border-radius:8px; object-fit:cover; background:#f0f0f0; flex-shrink:0; }
  .item-info { flex:1; min-width:0; }
  .item-name { font-size:0.83rem; font-weight:500; line-height:1.2; }
  .item-price { font-size:0.82rem; color:var(--pink-dark); font-weight:600; text-align:right; }

  .qty-control { display:flex; align-items:center; gap:4px; }
  .qty-btn { width:26px; height:26px; border:1.5px solid var(--border); border-radius:7px; background:var(--cream); cursor:pointer; font-weight:700; color:var(--pink-dark); }
  .qty-value { width:22px; text-align:center; font-weight:600; font-size:0.88rem; }
  .remove-btn { width:26px; height:26px; border:none; border-radius:7px; background:var(--pink-light); color:var(--pink-dark); cursor:pointer; }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(26,16,32,0.6); z-index:200; align-items:flex-end; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:#fff; width:100%; max-width:680px; border-radius:20px 20px 0 0; max-height:85vh; display:flex; flex-direction:column; }
  .modal-header { padding:16px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1.5px solid var(--border); }
  .modal-list { overflow-y:auto; padding:10px 20px 30px; flex:1; }

  /* ITEM NO MODAL COM SUPORTE A FOTO E QTD */
  .modal-product {
    padding:12px 0; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px;
  }
  .prod-img-min { width:45px; height:45px; border-radius:6px; object-fit:cover; background:#f9f9f9; }
  .modal-prod-info { flex:1; }
  .modal-prod-name { font-size:0.86rem; font-weight:500; margin-bottom:2px; }
  .modal-prod-price { font-size:0.85rem; font-weight:600; color:var(--pink-dark); }
  
  .modal-qty-badge {
    background: var(--pink); color: white; padding: 2px 7px;
    border-radius: 6px; font-size: 0.75rem; font-weight: 700;
    margin-right: 5px;
  }

  .btn-add-item { width:100%; padding:13px; border:2px dashed var(--border); border-radius:12px; background:transparent; color:var(--pink-dark); font-weight:600; cursor:pointer; margin-top:14px; }

  /* STICKY BAR */
  #sticky-bar { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:2px solid var(--border); padding:12px 20px; z-index:100; display:none; }
  #sticky-bar.visible { display:block; }
  .bar-inner { max-width:680px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; }
  .btn-whatsapp { background:var(--green); color:#fff; border:none; border-radius:10px; padding:11px 16px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; }

  .pix-card { background:linear-gradient(135deg,#fce8f0,#fff0f7); border:1.5px solid var(--border); border-radius:14px; padding:16px; margin-top:22px; display:flex; align-items:center; gap:12px; }
  .copy-btn { background:var(--pink); color:#fff; border:none; border-radius:8px; padding:9px 14px; font-size:0.78rem; font-weight:600; cursor:pointer; margin-left:auto; }

  /* CATEGORIAS */
  .cat-header { display:flex; align-items:center; gap:8px; padding:15px 0 5px; margin-top:10px; border-bottom:1px solid var(--pink-light); }
  .cat-name { font-family:'Playfair Display',serif; font-size:1rem; color:var(--pink-dark); font-weight:700; flex:1; }

</style>
</head>
<body>

<header>
  <h1>🌸 Produtos Priscila</h1>
  <p>Monte seu pedido e envie pelo WhatsApp</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('pedido',this)">🛒 Fazer Pedido</button>
  <button class="tab-btn" onclick="switchTab('historico',this)">📋 Meus Pedidos</button>
</div>

<div id="tab-pedido" class="tab-content active">
<main>
  <div id="products-loading" style="text-align:center; padding:40px; color:var(--gray);">Carregando produtos…</div>

  <div id="pedido-content" style="display:none">
    <div class="name-section">
      <label class="field-label">Seu nome</label>
      <input type="text" class="name-input" id="client-name" placeholder="Digite seu nome completo…" />
    </div>

    <div class="section-title">
      Meu Carrinho
      <span id="items-count" class="cart-badge-top">0 itens</span>
    </div>

    <div id="selected-list"></div>

    <button class="btn-add-item" onclick="openModal()">+ Adicionar produto</button>

    <div class="pix-card">
      <div style="font-size:1.5rem">💳</div>
      <div>
        <h3 style="font-size:0.9rem; color:var(--pink-dark)">Pagamento via PIX</h3>
        <div style="font-weight:600">47991839274</div>
      </div>
      <button class="copy-btn" onclick="copyPix(this)">Copiar</button>
    </div>
  </div>
</main>
</div>

<div id="tab-historico" class="tab-content">
  <main><div class="section-title">Histórico</div><div id="history-list"></div></main>
</div>

<div id="sticky-bar">
  <div class="bar-inner">
    <div>
      <div style="font-size:0.7rem; color:var(--gray)" id="bar-label">0 itens</div>
      <div style="font-family:'Playfair Display',serif; font-size:1.2rem; color:var(--pink-dark); font-weight:700" id="bar-amount">R$ 0,00</div>
    </div>
    <button class="btn-whatsapp" onclick="sendWhatsApp()">Enviar pedido</button>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 style="font-family:'Playfair Display',serif; font-size:1.1rem">Escolher Produtos</h2>
      <button onclick="closeModal()" style="border:none; background:none; font-size:1.5rem; color:var(--pink-dark); cursor:pointer">✕</button>
    </div>
    <div style="padding:10px 20px">
      <input type="text" id="search-input" placeholder="Buscar..." oninput="filterProducts()" style="width:100%; padding:10px; border-radius:10px; border:1.5px solid var(--border)">
    </div>
    <div class="modal-list" id="modal-list"></div>
  </div>
</div>

<script>
const SHEET_ID = '1q8E1PE5jix4nPsvaZd1g61rLI2jLflqfsXt7_YPwwoE';
const SHEET_PRODUCTS_NAME = 'Produtos';
const WHATSAPP_NUM = '5547991839274';

let products = [];
let cart = {}; 

function fmt(v) { return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }

async function loadProducts() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_PRODUCTS_NAME)}&t=${Date.now()}`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows = json.table.rows;
    products = rows.slice(1).map(r => ({
      code: (r.c[0]?.v ?? 'S/C').toString(),
      name: (r.c[1]?.v ?? '').toString(),
      price: parseFloat(r.c[2]?.v ?? 0),
      category: (r.c[3]?.v ?? 'Outros').toString(),
      img: (r.c[4]?.v ?? '') // Coluna E para imagens
    })).filter(p => p.name);
    document.getElementById('products-loading').style.display = 'none';
    document.getElementById('pedido-content').style.display = 'block';
    renderSelectedList();
  } catch(e) { console.error("Erro ao carregar", e); }
}

function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  renderModalList('');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e) { if(e.target.id === 'modal-overlay') closeModal(); }
function filterProducts() { renderModalList(document.getElementById('search-input').value); }

function renderModalList(query) {
  const q = query.toLowerCase().trim();
  const list = document.getElementById('modal-list');
  const filtered = products.filter(p => p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q));
  
  const categories = {};
  filtered.forEach(p => {
    if (!categories[p.category]) categories[p.category] = [];
    categories[p.category].push(p);
  });

  list.innerHTML = Object.keys(categories).sort().map(cat => `
    <div class="cat-header"><span class="cat-name">${cat}</span></div>
    ${categories[cat].map(p => {
      const qty = cart[p.code] || 0;
      return `
      <div class="modal-product" onclick="updateCart('${p.code}', 1)">
        <img src="${p.img || 'https://via.placeholder.com/50?text=...'}" class="prod-img-min">
        <div class="modal-prod-info">
          <div class="modal-prod-name">${p.name}</div>
          <div class="modal-prod-price">${fmt(p.price)}</div>
        </div>
        ${qty > 0 ? `<span class="modal-qty-badge">${qty}x</span>` : ''}
        <button class="qty-btn" style="background:${qty > 0 ? 'var(--pink)' : ''}; color:${qty > 0 ? '#fff' : ''}">${qty > 0 ? '✓' : '+'}</button>
      </div>`;
    }).join('')}
  `).join('');
}

function updateCart(code, delta) {
  const current = cart[code] || 0;
  const next = current + delta;
  if (next <= 0) delete cart[code];
  else cart[code] = next;
  
  renderSelectedList();
  renderModalList(document.getElementById('search-input').value);
  updateBar();
}

function renderSelectedList() {
  const container = document.getElementById('selected-list');
  const keys = Object.keys(cart);
  
  // Cálculo total de unidades (ex: 2 de um, 1 de outro = 3)
  const totalUnits = keys.reduce((acc, code) => acc + cart[code], 0);
  document.getElementById('items-count').textContent = totalUnits + (totalUnits === 1 ? ' unidade' : ' unidades');

  if (keys.length === 0) {
    container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--gray)">Carrinho vazio</div>';
    return;
  }

  container.innerHTML = keys.map(code => {
    const p = products.find(x => x.code === code);
    if (!p) return '';
    return `
    <div class="selected-item">
      <img src="${p.img || 'https://via.placeholder.com/50?text=...'}" class="item-img">
      <div class="item-info">
        <div class="item-name">${p.name}</div>
        <div class="item-price">${fmt(p.price * cart[code])}</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="updateCart('${code}', -1)">−</button>
        <div class="qty-value">${cart[code]}</div>
        <button class="qty-btn" onclick="updateCart('${code}', 1)">+</button>
      </div>
    </div>`;
  }).join('');
}

function updateBar() {
  const keys = Object.keys(cart);
  const bar = document.getElementById('sticky-bar');
  if (keys.length === 0) { bar.classList.remove('visible'); return; }
  
  const totalUnits = keys.reduce((acc, code) => acc + cart[code], 0);
  const totalCash = keys.reduce((acc, code) => {
    const p = products.find(x => x.code === code);
    return acc + (p.price * cart[code]);
  }, 0);

  bar.classList.add('visible');
  document.getElementById('bar-amount').textContent = fmt(totalCash);
  document.getElementById('bar-label').textContent = totalUnits + ' unidades no carrinho';
}

function sendWhatsApp() {
  const name = document.getElementById('client-name').value;
  if(!name) { alert("Por favor, digite seu nome"); return; }
  
  let msg = `🌸 *Novo Pedido*\n👤 Cliente: ${name}\n\n`;
  Object.keys(cart).forEach(code => {
    const p = products.find(x => x.code === code);
    msg += `• ${cart[code]}x ${p.name} (${fmt(p.price)})\n`;
  });
  
  const total = Object.keys(cart).reduce((acc, code) => {
    const p = products.find(x => x.code === code);
    return acc + (p.price * cart[code]);
  }, 0);
  
  msg += `\n💰 *Total: ${fmt(total)}*`;
  window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`);
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function copyPix(btn) {
  navigator.clipboard.writeText('47991839274');
  btn.textContent = "Copiado!";
  setTimeout(() => btn.textContent = "Copiar", 2000);
}

loadProducts();
</script>
</body>
</html>
